name: Build and Deploy pumpkin-be to Docker Hub and update tag in infra repo

on:
  push:
    branches: [ "main" ]
    paths:
      - "be/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "be/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./be
          file: ./be/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pumpkin-be:${{ github.sha }}

      # 1. Use actions/checkout to securely pull your infra repository
      - name: Checkout pumpkin_infra repo
        uses: actions/checkout@v4
        with:
          repository: 'elvish-ishaan/pumpkin_infra'
          token: ${{ secrets.PAT }}
          path: pumpkin_infra

      # 2. Modify and push changes normally
      - name: Update tag and push to infra repo
        run: |
          cd pumpkin_infra/helm/prod
          echo "inside prod directory"
          
          # Update image tag in values.yaml
          sed -i "s|tag: .*|tag: \"${{ github.sha }}\"|g" values.yaml
          echo "updated the image tag"

          # Commit and push changes
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add values.yaml
          git commit -m "Update pumpkin-be image to ${{ github.sha }}"
          git push